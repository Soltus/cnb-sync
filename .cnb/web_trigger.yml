# .cnb/web_trigger.yml
# 通用 cnb ↔ GitHub 同步按钮配置
# 可复用于任意 cnb 仓库
#
# 使用说明:
#   1. 将此文件通过 import 引用到你的仓库 .cnb.yml 中
#   2. 在 secrets 仓库中配置 GITHUB_TOKEN
#   3. 仓库页面右上角会出现同步按钮

branch:
  - buttons:
      # 按钮1: 推送 cnb → GitHub
      - name: 🚀 同步到GitHub
        description: 将当前分支推送到 GitHub 仓库
        event: web_trigger_cnb_to_github
        inputs:
          branch:
            type: input
            required: false
            name: 分支名
            description: 指定要推送的分支（留空则推送当前分支）
      
      # 按钮2: 拉取 GitHub → cnb
      - name: 📥 从GitHub拉取
        description: 从 GitHub 仓库拉取最新代码
        event: web_trigger_github_to_cnb
        inputs:
          branch:
            type: input
            required: false
            name: 分支名
            description: 指定要拉取的分支（留空则拉取当前分支）
      
      # 按钮3: 双向同步
      - name: 🔄 双向同步
        description: 先推送再拉取，保持两边一致
        event: web_trigger_full_sync
        inputs:
          dry_run:
            type: select
            required: false
            default: "false"
            name: 预览模式
            description: true=预览不执行, false=直接执行
            options:
              - name: 直接执行
                value: "false"
              - name: 预览模式
                value: "true"
