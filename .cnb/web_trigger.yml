# .cnb/web_trigger.yml
# 通用 cnb ↔ GitHub 同步按钮配置
# ⚠️ 此文件必须存在于仓库本地，不支持 include/imports
#
# 使用说明:
#   1. 复制此文件到仓库根目录的 .cnb/ 下
#   2. 在 .cnb.yml 的 include 中引用 .cnb/workflows/sync.yml
#   3. 在 secrets 仓库中配置 GITHUB_TOKEN 并通过 imports 引入

branch:
  - buttons:
      # 按钮1: 推送 cnb → GitHub
      # 触发事件: web_trigger_cnb_to_github
      # 对应流水线: .cnb/workflows/sync.yml 中的 web_trigger_cnb_to_github
      - name: 🚀 同步到GitHub
        description: 将当前分支推送到 GitHub 仓库
        event: web_trigger_cnb_to_github
        inputs:
          mode:
            type: select
            required: true
            default: "current"
            name: 同步范围
            description: 选择同步范围
            options:
              - name: 当前分支
                value: "current"
              - name: 全部分支
                value: "all"
          branch:
            type: input
            required: false
            name: 分支名
            description: 指定要推送的分支（当前分支模式下可留空）
          force:
            type: switch
            required: false
            default: "false"
            name: 强制覆盖
            description: 是否使用 --force 推送（谨慎使用）
          github_repo:
            type: input
            required: false
            name: GitHub 仓库
            description: 目标 GitHub 仓库地址（如 owner/repo，留空则使用默认）
      
      # 按钮2: 拉取 GitHub → cnb
      # 触发事件: web_trigger_github_to_cnb
      # 对应流水线: .cnb/workflows/sync.yml 中的 web_trigger_github_to_cnb
      - name: 📥 从GitHub拉取
        description: 从 GitHub 仓库拉取最新代码
        event: web_trigger_github_to_cnb
        inputs:
          mode:
            type: select
            required: true
            default: "current"
            name: 同步范围
            description: 选择同步范围
            options:
              - name: 当前分支
                value: "current"
              - name: 全部分支
                value: "all"
          branch:
            type: input
            required: false
            name: 分支名
            description: 指定要拉取的分支（当前分支模式下可留空）
          github_repo:
            type: input
            required: false
            name: GitHub 仓库
            description: 源 GitHub 仓库地址（如 owner/repo，留空则使用默认）
      
      # 按钮3: 双向同步（先推送再拉取）
      # 触发事件: web_trigger_full_sync
      # 对应流水线: .cnb/workflows/sync.yml 中的 web_trigger_full_sync
      - name: 🔄 双向同步
        description: 先推送再拉取，保持两边一致
        event: web_trigger_full_sync
        inputs:
          mode:
            type: select
            required: true
            default: "current"
            name: 同步范围
            description: 选择同步范围
            options:
              - name: 当前分支
                value: "current"
              - name: 全部分支
                value: "all"
          branch:
            type: input
            required: false
            name: 分支名
            description: 指定操作的分支（当前分支模式下可留空）
          force:
            type: switch
            required: false
            default: "false"
            name: 强制覆盖
            description: 推送时是否使用 --force
          github_repo:
            type: input
            required: false
            name: GitHub 仓库
            description: GitHub 仓库地址（如 owner/repo，留空则使用默认）
          dry_run:
            type: select
            required: false
            default: "false"
            name: 预览模式
            description: true=预览不执行, false=直接执行
            options:
              - name: 直接执行
                value: "false"
              - name: 预览模式
                value: "true"
