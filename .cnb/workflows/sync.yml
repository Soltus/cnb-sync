# .cnb/workflows/sync.yml
# 通用 cnb ↔ GitHub 同步流水线
#
# 使用说明:
#   1. 通过 include 引用到你的 .cnb.yml 中
#   2. 在 secrets 仓库中配置 GITHUB_TOKEN 并通过 allow_slugs 授权
#   3. 确保仓库中有 scripts/cnb-sync.sh
#
# 触发事件:
#   web_trigger_cnb_to_github  — 推送 cnb → GitHub（由按钮 "🚀 同步到GitHub" 触发）
#   web_trigger_github_to_cnb  — 拉取 GitHub → cnb（由按钮 "📥 从GitHub拉取" 触发）
#   web_trigger_full_sync      — 双向同步（由按钮 "🔄 双向同步" 触发）
#
# 注意: imports 必须放在每个事件的 - 项下（与 stages 同级），
#       否则 secrets 仓库的 GITHUB_TOKEN 不会被注入

$:
  # ========== 按钮1: 推送 cnb → GitHub ==========
  web_trigger_cnb_to_github:
    # 从 secrets 仓库导入 GITHUB_TOKEN
    - imports:
        - "https://cnb.cool/sc.hwd/secrets/-/blob/main/git/github.yml"
      stages:
        - name: 同步到 GitHub
          script: |
            set -euo pipefail
            BRANCH="${branch:-}"
            MODE="${mode:-current}"
            FORCE="${force:-false}"
            GITHUB_REPO="${github_repo:-}"
            
            echo "📤 开始同步到 GitHub..."
            echo "   CNB_REPO_SLUG: ${CNB_REPO_SLUG}"
            echo "   模式: ${MODE}"
            echo "   分支: ${BRANCH:-当前分支}"
            echo "   强制覆盖: ${FORCE}"
            echo "   GitHub 仓库: ${GITHUB_REPO:-默认}"
            
            cd /workspace
            export GITHUB_TOKEN="${GITHUB_TOKEN:?请配置 GITHUB_TOKEN}"
            export CNB_REPO_SLUG="${CNB_REPO_SLUG}"
            
            if [ -n "$GITHUB_REPO" ]; then
              export GITHUB_USER="$(echo "$GITHUB_REPO" | cut -d/ -f1)"
            fi
            
            if [ "$MODE" = "all" ]; then
              export SYNC_BRANCHES="$(git branch --format='%(refname:short)')"
            elif [ -n "$BRANCH" ]; then
              git checkout "$BRANCH" 2>/dev/null || true
              export SYNC_BRANCHES="$BRANCH"
            fi
            
            if [ "$FORCE" = "true" ]; then
              export DRY_RUN="false"
              bash scripts/cnb-sync.sh push --force 2>&1 || { echo "❌ 同步失败"; exit 1; }
            else
              bash scripts/cnb-sync.sh push 2>&1 || { echo "❌ 同步失败"; exit 1; }
            fi
            
            echo "✅ 同步完成!"

  # ========== 按钮2: 拉取 GitHub → cnb ==========
  web_trigger_github_to_cnb:
    # 从 secrets 仓库导入 GITHUB_TOKEN
    - imports:
        - "https://cnb.cool/sc.hwd/secrets/-/blob/main/git/github.yml"
      stages:
        - name: 从 GitHub 拉取
          script: |
            set -euo pipefail
            BRANCH="${branch:-}"
            MODE="${mode:-current}"
            GITHUB_REPO="${github_repo:-}"
            
            echo "📥 开始从 GitHub 拉取..."
            echo "   CNB_REPO_SLUG: ${CNB_REPO_SLUG}"
            echo "   模式: ${MODE}"
            echo "   分支: ${BRANCH:-当前分支}"
            
            cd /workspace
            export GITHUB_TOKEN="${GITHUB_TOKEN:?请配置 GITHUB_TOKEN}"
            export CNB_REPO_SLUG="${CNB_REPO_SLUG}"
            
            if [ -n "$GITHUB_REPO" ]; then
              export GITHUB_USER="$(echo "$GITHUB_REPO" | cut -d/ -f1)"
            fi
            
            if [ "$MODE" = "all" ]; then
              export SYNC_BRANCHES="$(git branch --format='%(refname:short)')"
            elif [ -n "$BRANCH" ]; then
              git checkout "$BRANCH" 2>/dev/null || true
              export SYNC_BRANCHES="$BRANCH"
            fi
            
            bash scripts/cnb-sync.sh pull 2>&1 || { echo "❌ 拉取失败"; exit 1; }
            
            echo "✅ 拉取完成!"

  # ========== 按钮3: 双向同步 ==========
  web_trigger_full_sync:
    # 从 secrets 仓库导入 GITHUB_TOKEN
    - imports:
        - "https://cnb.cool/sc.hwd/secrets/-/blob/main/git/github.yml"
      stages:
        - name: 双向同步
          script: |
            set -euo pipefail
            BRANCH="${branch:-}"
            MODE="${mode:-current}"
            FORCE="${force:-false}"
            DRY_RUN="${dry_run:-false}"
            GITHUB_REPO="${github_repo:-}"
            
            echo "🔄 开始双向同步..."
            echo "   CNB_REPO_SLUG: ${CNB_REPO_SLUG}"
            echo "   模式: ${MODE}"
            echo "   分支: ${BRANCH:-当前分支}"
            echo "   强制覆盖: ${FORCE}"
            echo "   预览模式: ${DRY_RUN}"
            
            export DRY_RUN="${DRY_RUN}"
            export GITHUB_TOKEN="${GITHUB_TOKEN:?请配置 GITHUB_TOKEN}"
            export CNB_REPO_SLUG="${CNB_REPO_SLUG}"
            
            if [ -n "$GITHUB_REPO" ]; then
              export GITHUB_USER="$(echo "$GITHUB_REPO" | cut -d/ -f1)"
            fi
            
            if [ "$MODE" = "all" ]; then
              export SYNC_BRANCHES="$(git branch --format='%(refname:short)')"
            elif [ -n "$BRANCH" ]; then
              git checkout "$BRANCH" 2>/dev/null || true
              export SYNC_BRANCHES="$BRANCH"
            fi
            
            bash scripts/cnb-sync.sh sync 2>&1 || { echo "❌ 同步失败"; exit 1; }
            
            echo "✅ 双向同步完成!"
